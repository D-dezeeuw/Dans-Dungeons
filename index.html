  <!-- BUILD:CSS-CRITICAL --><style>/* critical.css — inlined by build.js into <head>
   Only what is needed to paint the chrome header + transcript skeleton.
   Everything else lives in style.css, loaded non-blocking after first paint. */

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── Cloak — hides data-if elements until Spektrum binds ── */
[data-cloak] { display: none !important; }

/* ─── Tokens ─────────────────────────────────────────────── */
:root {
  --bg:          #0d0d0d;
  --bg-mid:      #141414;
  --bg-edge:     #1c1c1c;
  --border:      #2a2a2a;
  --text:        #c8c0a8;
  --gm:          #d4b896;
  --player:      #7ec8e3;
  --system:      #9a9080;
  --option:      #8ab08a;
  --error:       #e05050;
  --hp-ok:       #4ade80;
  --hp-low:      #f87171;
  --chip-bg:     #242424;
  --chip-border: #4a4a4a;
  --chip-hover:  #303030;
  --font:        'Courier New', Courier, 'Lucida Console', monospace;
  --sidebar-w:   220px;
}

/* ─── Base ───────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  touch-action: manipulation;
}

/* ─── Spektrum gate ──────────────────────────────────────── */
/* Body stays invisible (but full 100vw/100vh) until Spektrum  */
/* has ticked and bound the DOM — then fades in cleanly.       */
body { opacity: 0; }
body.spektrum-ready { opacity: 1; transition: opacity 0.1s ease; }

/* ─── App shell ──────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Chrome header ──────────────────────────────────────── */
#chrome {
  display: flex;
  flex-direction: column;
  padding: 0.3rem 1rem;
  background: var(--bg-edge);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#chrome-row1 {
  display: flex;
  align-items: center;
  gap: 1rem;
}
#chrome-row2,
#chrome-row3 {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  min-height: 0;
  padding: 0.1rem 0;
}
#chrome-row2:empty,
#chrome-row3:empty { display: none; }
#title { font-weight: bold; color: var(--gm); letter-spacing: 0.05em; }

/* ─── Game area ──────────────────────────────────────────── */
#game {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Transcript ─────────────────────────────────────────── */
#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
  scroll-behavior: smooth;
  position: relative;
}
#transcript-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.2;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

/* ─── Entries ────────────────────────────────────────────── */
.entry {
  position: relative;
  z-index: 1;
  margin-bottom: 0.4rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.entry-gm      { color: var(--gm); }
.entry-player  { color: var(--player); }
.entry-system  { color: var(--system); }
.entry-option  { color: var(--option); }
.entry-error   { color: var(--error); }

/* ─── Sidebar pre-init (prevents CLS on boot) ────────────── */
/* Applied by inline script before render; JS removes it once it takes over */
[data-sidebar-init="collapsed"] #sidebar {
  width: 0 !important;
  padding: 0 !important;
  border-left-color: transparent !important;
}

/* ─── Skeleton — hide chrome extras + sidebar until style.css loads ────── */
/* #chrome-row2/#chrome-row3 are excluded: they are data-cloak + data-if   */
/* controlled by Spektrum and must NOT also be opacity-gated.               */
#sidebar,
#footer > *,
#brand-bar {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

html.styles-loaded #sidebar,
html.styles-loaded #footer > *,
html.styles-loaded #brand-bar {
  opacity: 1;
  pointer-events: auto;
}

/* ─── Mobile layout — in critical CSS to prevent CLS ────── */
/* These rules must apply before first paint; duplicated from style.css */
@media (max-width: 767px) {
  #brand-bar { display: none; }

  #footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }

  /* Reserve space for fixed footer so transcript isn't hidden behind it */
  #game { padding-bottom: 145px; }
}
</style><!-- /BUILD:CSS-CRITICAL -->

  <script>
    // Pre-collapse sidebar before first render to prevent CLS.
    // Reads the same localStorage key used by makePanel() in console.js.
    try {
      var _sv = localStorage.getItem('dg-sidebar');
      var _open = _sv !== null ? _sv === 'open' : innerWidth >= 768;
      if (!_open) document.documentElement.dataset.sidebarInit = 'collapsed';
    } catch(e) {}
  </script>

<body>
  <div id="app">

    <header id="chrome">
      <div id="chrome-row1">
        <span id="title"><img src="favicon.svg" alt="" aria-hidden="true" id="title-icon" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"> DnD – Dan's Dungeons</span>

        <button id="sidebar-toggle" aria-label="Toggle settings"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button id="roleplay-btn" data-cloak data-if="ai.key" :ariaPressed="ui.roleplayActive" aria-pressed="false" aria-label="Roleplay mode" title="Roleplay mode"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 11h.01"/><path d="M14 6h.01"/><path d="M18 6h.01"/><path d="M6.5 13.1h.01"/><path d="M22 5c0 9-4 12-6 12s-6-3-6-12c0-2 2-3 6-3s6 1 6 3"/><path d="M17.4 9.9c-.8.8-2 .8-2.8 0"/><path d="M10.1 7.1C9 7.2 7.7 7.7 6 8.6c-3.5 2-4.7 3.9-3.7 5.6 4.5 7.8 9.5 8.4 11.2 7.4.9-.5 1.9-2.1 1.9-4.7"/><path d="M9.1 16.5c.3-1.1 1.4-1.7 2.4-1.4"/></svg></button>
      </div>
      <div id="chrome-row2" data-cloak data-if="ui.pcStatsVisible">
        <span id="pc-header-stats" :innerHTML="ui.pcStats"></span>
      </div>
      <div id="chrome-row3" data-cloak data-if="ui.enemyStatsVisible">
        <span id="enemy-header-stats" :innerHTML="ui.enemyStats"></span>
      </div>
    </header>

    <div id="sidebar-backdrop" aria-hidden="true"></div>

    <main id="game">
      <div id="transcript" role="log" aria-live="polite" aria-atomic="false">
        <div id="transcript-bg" aria-hidden="true"></div>
        <button id="tts-toggle" data-cloak data-if="ai.key" :ariaPressed="ui.ttsActive" :innerHTML="ui.ttsIconHtml" aria-pressed="false" aria-label="Toggle narration voice" title="Toggle narration voice"></button>
        <div id="skeleton-loading" class="entry entry-system" aria-hidden="true">Dan's Dungeons is loading…</div>
      </div>

      <aside id="sidebar" aria-label="Settings">
        <div id="sidebar-header">
          <span id="sidebar-title">Settings</span>
          <button id="sidebar-close" aria-label="Close settings"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
        </div>
        <div id="locale-toggle-row">
          <span class="ab-toggle-label" id="locale-label">Language</span>
          <span id="locale-switch">
            <button id="locale-en" class="locale-opt" data-locale="en" title="English">EN</button>
            <span class="locale-sep">–</span>
            <button id="locale-nl" class="locale-opt" data-locale="nl" title="Dutch">NL</button>
          </span>
        </div>
        <div id="deluxe-section">
          <div class="export-zone-label">{{ui.tierLabel}}</div>
          <button id="deluxe-upgrade" class="export-tile" data-cloak data-if="ui.isFree" title="Unlock TTS, STT, images, and world generation">Upgrade to Deluxe</button>
          <div data-cloak data-if="ui.isDeluxe" id="deluxe-feature-list">
            <span class="deluxe-feature">STT</span>
            <span class="deluxe-feature">TTS</span>
            <span class="deluxe-feature">Images</span>
            <span class="deluxe-feature">World gen</span>
          </div>
        </div>
        <div id="sketch-toggle-row">
          <span class="ab-toggle-label">Scene sketch</span>
          <button id="sketch-toggle" :ariaPressed="ui.sceneImageActive" aria-pressed="false" aria-label="Toggle scene sketch" title="Generate an AI scene sketch after each turn">{{ui.sceneImageLabel}}</button>
        </div>
        <div id="sketch-controls" data-cloak data-if="settings.sceneImage" role="group" aria-labelledby="sketch-controls-label">
          <span id="sketch-controls-label">Sketch</span>
          <button id="sketch-btn-min" :ariaPressed="ui.sketchMinPressed" aria-pressed="false" title="Minimize sketch" aria-label="Minimize sketch"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/></svg></button>
          <button id="sketch-btn-win" :ariaPressed="ui.sketchWinPressed" aria-pressed="true"  title="Windowed sketch" aria-label="Windowed sketch"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/></svg></button>
          <button id="sketch-btn-max" :ariaPressed="ui.sketchMaxPressed" aria-pressed="false" title="Maximize sketch" aria-label="Maximize sketch"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/></svg></button>
        </div>
        <div id="ab-toggle-row">
          <span class="ab-toggle-label">Action bar</span>
          <button id="action-bar-toggle" :ariaPressed="ui.actionBarActive" aria-pressed="true" aria-label="Toggle action bar" title="Show the action bar above the input">{{ui.actionBarLabel}}</button>
        </div>
        <div id="db-toggle-row">
          <span class="ab-toggle-label">Last turn</span>
          <button id="debug-bar-toggle" :ariaPressed="ui.debugBarActive" aria-pressed="false" aria-label="Toggle last turn panel" title="Show last turn debug info below the action bar">{{ui.debugBarLabel}}</button>
        </div>
        <div id="verify-row">
          <span class="ab-toggle-label">Seeded rolls</span>
          <button id="verify-rolls-btn" aria-label="Verify seeded combat rolls" title="Replay the recorded combat rolls from the seed and confirm they all reproduce">Verify</button>
        </div>
        <div id="export-zone">
          <div class="export-zone-label">Export / Import</div>
          <div id="export-tiles">
            <button class="export-tile" id="export-journal"    title="Download adventure as a styled HTML journal">Journal</button>
            <button class="export-tile" id="export-screenshot" title="Save current scene sketch as PNG">Screenshot</button>
            <button class="export-tile" id="export-sketches"   title="Download all session sketches as HTML">All Sketches</button>
            <button class="export-tile" id="export-save"       title="Download your game as a save file">Save</button>
            <button class="export-tile" id="export-import"     title="Import a saved game file">Import</button>
            <button class="export-tile" id="export-world-bible" title="Generate a world and export as EPUB lore book">World Bible</button>
          </div>
          <input type="file" id="import-file-input" accept=".dnd.json,.json" style="display:none" aria-label="Import save file">
        </div>
      </aside>
    </main>

    <footer id="footer">
      <div id="action-bar" data-cloak data-if="ui.actionBarVisible" aria-label="Action bar">
        <div class="ab-zone ab-move-zone" role="group" aria-labelledby="ab-label-move">
          <div class="ab-zone-label" id="ab-label-move">Move</div>
          <div id="ab-compass">
            <button id="ab-north" class="ab-dir-btn" style="grid-column:2;grid-row:1" disabled aria-label="Go north">N</button>
            <button id="ab-west"  class="ab-dir-btn" style="grid-column:1;grid-row:2" disabled aria-label="Go west">W</button>
            <button id="ab-east"  class="ab-dir-btn" style="grid-column:3;grid-row:2" disabled aria-label="Go east">E</button>
            <button id="ab-south" class="ab-dir-btn" style="grid-column:2;grid-row:3" disabled aria-label="Go south">S</button>
          </div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-abilities-zone" role="group" aria-labelledby="ab-label-class">
          <div class="ab-zone-label" id="ab-label-class">Class</div>
          <div id="ab-abilities-list" data-each="ui.classWords" data-as="word"><span :class="word.cls" :data-tip="word.tip">{{word.label}}</span></div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-skills-zone" role="group" aria-labelledby="ab-label-skills">
          <div class="ab-zone-label" id="ab-label-skills">Skills</div>
          <div id="ab-skills-list" data-each="ui.skillWords" data-as="word"><span :class="word.cls" :data-tip="word.tip">{{word.label}}</span></div>
        </div>
      </div>
      <div id="debug-bar" data-cloak data-if="ui.debugBarVisible" aria-label="Last turn debug info">
        <span>Last turn</span>
      </div>
      <div id="debug-panel" data-cloak data-if="ui.debugBarVisible"></div>
      <div id="input-row">
        <span id="prompt-indicator">&gt;</span>
        <input
          id="cmd"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="What do you do?"
          aria-label="Command input"
        >
        <button id="undo-btn" class="input-icon-btn" style="display:none" aria-label="Undo last turn" title="Undo the last turn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg></button>
        <button id="redo-btn" class="input-icon-btn" style="display:none" aria-label="Redo last undone turn" title="Redo the last undone turn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5A5.5 5.5 0 0 0 9.5 20H13"/></svg></button>
        <button id="timeline-btn" class="input-icon-btn" style="display:none" aria-label="Timeline" title="Timeline — jump to any turn or branch"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><line x1="6" x2="6" y1="3" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg><span id="timeline-count" class="branch-count">0</span></button>
        <div id="timeline-panel" role="menu" aria-label="Run timeline"></div>

        <button id="mic-btn" class="input-icon-btn" data-cloak aria-label="Record voice input" title="Speak your action (Spacebar)" data-if="ai.key"><svg width="20" height="20" viewBox="0 0 13 13" fill="currentColor" aria-hidden="true" focusable="false"><circle cx="6.5" cy="6.5" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="6.5" cy="6.5" r="2.5"/></svg></button>
      </div>

  </div>
  <link rel="stylesheet" href="src/ui/style.css">
  <script src="vendor/app.bundle.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Dans-Dungeons/sw.js');
      // Eagerly check for a new version on every page load.
      fetch('/Dans-Dungeons/vendor/app.version', { cache: 'no-store' })
        .then(r => r.ok ? r.text() : null)
        .then(remote => {
          if (!remote) return;
          var sw = navigator.serviceWorker.controller;
          if (sw) sw.postMessage({ type: 'VERSION_CHECK', version: remote.trim() });
        }).catch(function(){});
    }
  </script>
