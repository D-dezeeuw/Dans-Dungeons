<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dan's Dungeons</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- BUILD:CSS-CRITICAL --><style>/* critical.css — inlined by build.js into <head>
   Only what is needed to paint the chrome header + transcript skeleton.
   Everything else lives in style.css, loaded non-blocking after first paint. */

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── Tokens ─────────────────────────────────────────────── */
:root {
  --bg:          #0d0d0d;
  --bg-mid:      #141414;
  --bg-edge:     #1c1c1c;
  --border:      #2a2a2a;
  --text:        #c8c0a8;
  --gm:          #d4b896;
  --player:      #7ec8e3;
  --system:      #9a9080;
  --option:      #8ab08a;
  --error:       #e05050;
  --hp-ok:       #4ade80;
  --hp-low:      #f87171;
  --chip-bg:     #242424;
  --chip-border: #4a4a4a;
  --chip-hover:  #303030;
  --font:        'Courier New', Courier, 'Lucida Console', monospace;
  --sidebar-w:   220px;
}

/* ─── Base ───────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
}

/* ─── App shell ──────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Chrome header ──────────────────────────────────────── */
#chrome {
  display: flex;
  flex-direction: column;
  padding: 0.3rem 1rem;
  background: var(--bg-edge);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#chrome-row1 {
  display: flex;
  align-items: center;
  gap: 1rem;
}
#chrome-row2 {
  display: flex;
  align-items: center;
  min-height: 0;
}
#chrome-row2:empty { display: none; }
#title { font-weight: bold; color: var(--gm); letter-spacing: 0.05em; }

/* ─── Game area ──────────────────────────────────────────── */
#game {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Transcript ─────────────────────────────────────────── */
#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
  scroll-behavior: smooth;
  position: relative;
}
#transcript-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.2;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

/* ─── Entries ────────────────────────────────────────────── */
.entry {
  position: relative;
  z-index: 1;
  margin-bottom: 0.4rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.entry-gm      { color: var(--gm); }
.entry-player  { color: var(--player); }
.entry-system  { color: var(--system); }
.entry-option  { color: var(--option); }
.entry-error   { color: var(--error); }

/* ─── Sidebar pre-init (prevents CLS on boot) ────────────── */
/* Applied by inline script before render; JS removes it once it takes over */
[data-sidebar-init="collapsed"] #sidebar {
  width: 0 !important;
  padding: 0 !important;
  border-left-color: transparent !important;
}

/* ─── Skeleton — hide everything except title row until style.css loads ── */
/* Keeps layout space (no CLS) but nothing is visible until styles-loaded  */
#chrome-row2,
#chrome-row3,
#sidebar,
#footer > *,
#brand-bar {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

html.styles-loaded #chrome-row2,
html.styles-loaded #chrome-row3,
html.styles-loaded #sidebar,
html.styles-loaded #footer > *,
html.styles-loaded #brand-bar {
  opacity: 1;
  pointer-events: auto;
}

/* ─── Mobile layout — in critical CSS to prevent CLS ────── */
/* These rules must apply before first paint; duplicated from style.css */
@media (max-width: 767px) {
  #brand-bar { display: none; }

  #footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }

  /* Reserve space for fixed footer so transcript isn't hidden behind it */
  #game { padding-bottom: 145px; }
}
</style><!-- /BUILD:CSS-CRITICAL -->

  <script>
    // Pre-collapse sidebar before first render to prevent CLS.
    // Reads the same localStorage key used by makePanel() in console.js.
    try {
      var _sv = localStorage.getItem('dg-sidebar');
      var _open = _sv !== null ? _sv === 'open' : innerWidth >= 768;
      if (!_open) document.documentElement.dataset.sidebarInit = 'collapsed';
    } catch(e) {}
  </script>

<body>
  <div id="app">

    <header id="chrome">
      <div id="chrome-row1">
        <span id="title"><img src="favicon.svg" alt="" aria-hidden="true" id="title-icon" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"> DnD – Dan's Dungeons</span>
        <span id="turn-counter" data-if="session.turnCount">Turn {{session.turnCount}}</span>
        <span id="cost-meter" title="Estimated AI cost this session" data-if="ui.costDisplay">{{ui.costDisplay}}</span>
        <button id="sidebar-toggle" aria-label="Toggle settings">⚙</button>
      </div>
      <div id="chrome-row2" style="display:none">
        <span id="pc-header-stats"></span>
      </div>
      <div id="chrome-row3" style="display:none">
        <span id="enemy-header-stats"></span>
      </div>
    </header>

    <div id="sidebar-backdrop" aria-hidden="true"></div>

    <main id="game">
      <div id="transcript" role="log" aria-live="polite" aria-atomic="false">
        <div id="transcript-bg" aria-hidden="true"></div>
        <div id="skeleton-loading" class="entry entry-system" aria-hidden="true">⚔ Dan's Dungeons is loading…</div>
      </div>

      <aside id="sidebar">
        <div id="sidebar-header">
          <span id="sidebar-title">Settings</span>
          <button id="copy-key-btn" data-if="ai.key" style="display:none" aria-label="Copy API key" title="Copy API key to clipboard">🔑</button>
          <button id="sidebar-close" aria-label="Close settings">✕</button>
        </div>
        <div id="sketch-controls" style="display:none">
          <span id="sketch-controls-label">Sketch</span>
          <button id="sketch-btn-min" aria-pressed="false" title="Minimize sketch" aria-label="Minimize sketch">⊟</button>
          <button id="sketch-btn-win" aria-pressed="true"  title="Windowed sketch" aria-label="Windowed sketch">⊡</button>
          <button id="sketch-btn-max" aria-pressed="false" title="Maximize sketch" aria-label="Maximize sketch">⊞</button>
        </div>
        <div id="ab-toggle-row">
          <span class="ab-toggle-label">Action bar</span>
          <button id="action-bar-toggle" aria-pressed="true" aria-label="Toggle action bar" title="Show the action bar above the input">ON</button>
        </div>
        <div id="export-zone">
          <div class="export-zone-label">Export / Import</div>
          <div id="export-tiles">
            <button class="export-tile" id="export-journal"    title="Download adventure as a styled HTML journal">Journal</button>
            <button class="export-tile" id="export-screenshot" title="Save current scene sketch as PNG">Screenshot</button>
            <button class="export-tile" id="export-sketches"   title="Download all session sketches as HTML">All Sketches</button>
            <button class="export-tile" id="export-import"     title="Import a saved game file">Import</button>
          </div>
          <input type="file" id="import-file-input" accept=".dnd.json,.json" style="display:none" aria-label="Import save file">
        </div>
      </aside>
    </main>

    <footer id="footer">
      <div id="action-bar" style="display:none" aria-label="Action bar">
        <div class="ab-zone ab-move-zone">
          <div class="ab-zone-label">Move</div>
          <div id="ab-compass">
            <button id="ab-north" class="ab-dir-btn" style="grid-column:2;grid-row:1" disabled aria-label="Go north">N</button>
            <button id="ab-west"  class="ab-dir-btn" style="grid-column:1;grid-row:2" disabled aria-label="Go west">W</button>
            <button id="ab-east"  class="ab-dir-btn" style="grid-column:3;grid-row:2" disabled aria-label="Go east">E</button>
            <button id="ab-south" class="ab-dir-btn" style="grid-column:2;grid-row:3" disabled aria-label="Go south">S</button>
          </div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-abilities-zone">
          <div class="ab-zone-label">Class</div>
          <div id="ab-abilities-list"></div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-skills-zone">
          <div class="ab-zone-label">Skills</div>
          <div id="ab-skills-list"></div>
        </div>
      </div>
      <div id="debug-bar" role="button" tabindex="0">
        <span>Last turn</span><span class="toggle-chevron">▾</span>
      </div>
      <div id="debug-panel"></div>
      <div id="input-row">
        <span id="prompt-indicator">&gt;</span>
        <input
          id="cmd"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="What do you do?"
          aria-label="Command input"
        >
      </div>
    </footer>

    <div id="brand-bar">
      <span class="brand-social">
        <a href="https://github.com/D-dezeeuw" target="_blank" rel="noopener" aria-label="GitHub">

        </a>
        <a href="https://www.npmjs.com/~ddezeeuw" target="_blank" rel="noopener" aria-label="npm">

        </a>
      </span>
      <a class="brand-company" href="https://www.linkedin.com/in/ddezeeuw/" target="_blank" rel="noopener">Neko Media</a>

    </div>

  </div>

</body>
</html>
