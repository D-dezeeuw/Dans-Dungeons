<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dan's Dungeons</title>
  <link rel="stylesheet" href="src/ui/style.css">

  <script type="importmap">
  {
    "imports": {
      "spektrum":       "./vendor/spektrum.js",
      "bag-of-holding": "./vendor/bag-of-holding/index.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <header id="chrome">
      <span id="title">⚔ Dan's Dungeons</span>
      <span id="turn-counter"></span>
      <span id="cost-meter" title="Estimated AI cost this session"></span>
    </header>

    <main id="game">
      <div id="transcript" role="log" aria-live="polite" aria-atomic="false"></div>

      <aside id="sidebar">
        <div id="pc-stats"></div>
        <div id="enemy-stats"></div>
        <div id="action-chips"></div>
        <div id="character-chips"></div>
        <div id="skill-chips"></div>
        <div id="debug-panel"></div>
      </aside>
    </main>

    <footer id="input-row">
      <span id="prompt-indicator">&gt;</span>
      <input
        id="cmd"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="What do you do?"
        aria-label="Command input"
      >
    </footer>

  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
