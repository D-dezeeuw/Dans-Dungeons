<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dan's Dungeons</title>
  <link rel="stylesheet" href="src/ui/style.css">

  <script type="importmap">
  {
    "imports": {
      "spektrum":       "./vendor/spektrum.js",
      "bag-of-holding": "./vendor/bag-of-holding/index.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <header id="chrome">
      <span id="title">⚔ Dan's Dungeons</span>
      <span id="turn-counter" data-if="session.turnCount">Turn {{session.turnCount}}</span>
      <span id="cost-meter" title="Estimated AI cost this session" data-if="ui.costDisplay">{{ui.costDisplay}}</span>
      <button id="scene-image-toggle" title="Toggle scene sketch — generates an AI journal-sketch after each turn" aria-label="Toggle scene sketch" aria-pressed="false">🖼</button>
      <button id="sidebar-toggle" aria-label="Toggle sidebar">◀</button>
    </header>

    <main id="game">
      <div id="transcript" role="log" aria-live="polite" aria-atomic="false">
        <div id="scene-image-panel" style="display:none" aria-hidden="true">
          <div id="scene-image-loading">✏ sketching…</div>
          <img id="scene-image" alt="Scene sketch" style="display:none">
        </div>
      </div>

      <aside id="sidebar">
        <div id="sidebar-header">
          <button id="copy-key-btn" data-if="ai.key" aria-label="Copy API key" title="Copy API key to clipboard">🔑</button>
        </div>
        <div id="pc-stats"></div>
        <div id="enemy-stats"></div>
        <div id="action-chips"></div>
        <div id="character-chips"></div>
        <div id="skill-chips"></div>
      </aside>
    </main>

    <footer id="footer">
      <div id="debug-bar" role="button" tabindex="0">
        <span>Last turn</span><span class="toggle-chevron">▾</span>
      </div>
      <div id="debug-panel"></div>
      <div id="input-row">
        <span id="prompt-indicator">&gt;</span>
        <input
          id="cmd"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="What do you do?"
          aria-label="Command input"
        >
      </div>
    </footer>

    <div id="brand-bar">
      <span class="brand-social">
        <a href="https://github.com/D-dezeeuw" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.npmjs.com/~ddezeeuw" target="_blank" rel="noopener">npm</a>
      </span>
      <a class="brand-company" href="https://www.linkedin.com/in/ddezeeuw/" target="_blank" rel="noopener">Neko Media</a>
      <span class="brand-powered">Powered by <a href="https://www.npmjs.com/package/spektrum" target="_blank" rel="noopener"><em>SPEKTRUM</em></a></span>
    </div>

  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
