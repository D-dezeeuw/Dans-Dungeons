<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A browser-based AI dungeon master. Bring your own OpenRouter key and adventure through a procedurally generated world — no install, no backend.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-tAUjT3wKLNTnmsNWU+RI09/9OXYPvgyVs4hlkuw4C0I=' 'sha256-1Ghol9u9Gp6NvaTzMTR9Blrv2dd19QsKCUyVFclf1gg='; style-src 'self' 'unsafe-inline'; connect-src https:; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
  <meta property="og:title" content="Dan's Dungeons">
  <meta property="og:description" content="A browser-based AI dungeon master. Bring your own OpenRouter key and adventure through a procedurally generated world.">
  <meta property="og:type" content="website">
  <title>Dan's Dungeons</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- BUILD:CSS-CRITICAL --><style>/* critical.css — inlined by build.js into <head>
   Only what is needed to paint the chrome header + transcript skeleton.
   Everything else lives in style.css, loaded non-blocking after first paint. */

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── Cloak — hides data-if elements until Spektrum binds ── */
[data-cloak] { display: none !important; }

/* ─── Tokens ─────────────────────────────────────────────── */
:root {
  --bg:          #0d0d0d;
  --bg-mid:      #141414;
  --bg-edge:     #1c1c1c;
  --border:      #2a2a2a;
  --text:        #c8c0a8;
  --gm:          #d4b896;
  --player:      #7ec8e3;
  --system:      #9a9080;
  --option:      #8ab08a;
  --error:       #e05050;
  --hp-ok:       #4ade80;
  --hp-low:      #f87171;
  --chip-bg:     #242424;
  --chip-border: #4a4a4a;
  --chip-hover:  #303030;
  --font:        'Courier New', Courier, 'Lucida Console', monospace;
  --sidebar-w:   220px;
}

/* ─── Base ───────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
}

/* ─── Spektrum gate ──────────────────────────────────────── */
/* Body stays invisible (but full 100vw/100vh) until Spektrum  */
/* has ticked and bound the DOM — then fades in cleanly.       */
body { opacity: 0; }
body.spektrum-ready { opacity: 1; transition: opacity 0.1s ease; }

/* ─── App shell ──────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ─── Chrome header ──────────────────────────────────────── */
#chrome {
  display: flex;
  flex-direction: column;
  padding: 0.3rem 1rem;
  background: var(--bg-edge);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#chrome-row1 {
  display: flex;
  align-items: center;
  gap: 1rem;
}
#chrome-row2,
#chrome-row3 {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  min-height: 0;
  padding: 0.1rem 0;
}
#chrome-row2:empty,
#chrome-row3:empty { display: none; }
#title { font-weight: bold; color: var(--gm); letter-spacing: 0.05em; }

/* ─── Game area ──────────────────────────────────────────── */
#game {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Transcript ─────────────────────────────────────────── */
#transcript {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
  scroll-behavior: smooth;
  position: relative;
}
#transcript-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: center;
  opacity: 0.2;
  transition: opacity 0.5s ease;
  pointer-events: none;
}

/* ─── Entries ────────────────────────────────────────────── */
.entry {
  position: relative;
  z-index: 1;
  margin-bottom: 0.4rem;
  white-space: pre-wrap;
  word-break: break-word;
}
.entry-gm      { color: var(--gm); }
.entry-player  { color: var(--player); }
.entry-system  { color: var(--system); }
.entry-option  { color: var(--option); }
.entry-error   { color: var(--error); }

/* ─── Sidebar pre-init (prevents CLS on boot) ────────────── */
/* Applied by inline script before render; JS removes it once it takes over */
[data-sidebar-init="collapsed"] #sidebar {
  width: 0 !important;
  padding: 0 !important;
  border-left-color: transparent !important;
}

/* ─── Skeleton — hide chrome extras + sidebar until style.css loads ────── */
/* #chrome-row2/#chrome-row3 are excluded: they are data-cloak + data-if   */
/* controlled by Spektrum and must NOT also be opacity-gated.               */
#sidebar,
#footer > *,
#brand-bar {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

html.styles-loaded #sidebar,
html.styles-loaded #footer > *,
html.styles-loaded #brand-bar {
  opacity: 1;
  pointer-events: auto;
}

/* ─── Mobile layout — in critical CSS to prevent CLS ────── */
/* These rules must apply before first paint; duplicated from style.css */
@media (max-width: 767px) {
  #brand-bar { display: none; }

  #footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }

  /* Reserve space for fixed footer so transcript isn't hidden behind it */
  #game { padding-bottom: 145px; }
}
</style><!-- /BUILD:CSS-CRITICAL -->
  <!-- BUILD:CSS-DEFERRED --><noscript><link rel="stylesheet" href="src/ui/style.css"></noscript><!-- /BUILD:CSS-DEFERRED -->
  <script>
    // Pre-collapse sidebar before first render to prevent CLS.
    // Reads the same localStorage key used by makePanel() in console.js.
    try {
      var _sv = localStorage.getItem('dg-sidebar');
      var _open = _sv !== null ? _sv === 'open' : innerWidth >= 768;
      if (!_open) document.documentElement.dataset.sidebarInit = 'collapsed';
    } catch(e) {}
  </script>
</head>
<body>
  <div id="app">

    <header id="chrome">
      <div id="chrome-row1">
        <span id="title"><img src="favicon.svg" alt="" aria-hidden="true" id="title-icon" style="width:18px;height:18px;display:inline-block;vertical-align:middle;"> DnD – Dan's Dungeons</span>
        <span id="turn-counter" data-cloak data-if="session.turnCount">Turn {{session.turnCount}}</span>
        <span id="cost-meter" title="Estimated AI cost this session" data-cloak data-if="ui.costDisplay">{{ui.costDisplay}}</span>
        <button id="sidebar-toggle" aria-label="Toggle settings">⚙</button>
        <button id="roleplay-btn" data-cloak data-if="ai.key" :ariaPressed="ui.roleplayActive" aria-pressed="false" aria-label="Roleplay mode" title="Roleplay mode">🎭</button>
      </div>
      <div id="chrome-row2" data-cloak data-if="ui.pcStatsVisible">
        <span id="pc-header-stats" :innerHTML="ui.pcStats"></span>
      </div>
      <div id="chrome-row3" data-cloak data-if="ui.enemyStatsVisible">
        <span id="enemy-header-stats" :innerHTML="ui.enemyStats"></span>
      </div>
    </header>

    <div id="sidebar-backdrop" aria-hidden="true"></div>

    <main id="game">
      <div id="transcript" role="log" aria-live="polite" aria-atomic="false">
        <div id="transcript-bg" aria-hidden="true"></div>
        <button id="tts-toggle" data-cloak data-if="ai.key" :ariaPressed="ui.ttsActive" aria-pressed="false" aria-label="Toggle narration voice" title="Toggle narration voice">{{ui.ttsIcon}}</button>
        <div id="skeleton-loading" class="entry entry-system" aria-hidden="true">⚔ Dan's Dungeons is loading…</div>
      </div>

      <aside id="sidebar" aria-label="Settings">
        <div id="sidebar-header">
          <span id="sidebar-title">Settings</span>
          <button id="copy-key-btn" data-cloak data-if="ai.key" aria-label="Copy API key" title="Copy API key to clipboard">🔑</button>
          <button id="sidebar-close" aria-label="Close settings">✕</button>
        </div>
        <div id="sketch-controls" data-cloak data-if="settings.sceneImage" role="group" aria-labelledby="sketch-controls-label">
          <span id="sketch-controls-label">Sketch</span>
          <button id="sketch-btn-min" :ariaPressed="ui.sketchMinPressed" aria-pressed="false" title="Minimize sketch" aria-label="Minimize sketch">⊟</button>
          <button id="sketch-btn-win" :ariaPressed="ui.sketchWinPressed" aria-pressed="true"  title="Windowed sketch" aria-label="Windowed sketch">⊡</button>
          <button id="sketch-btn-max" :ariaPressed="ui.sketchMaxPressed" aria-pressed="false" title="Maximize sketch" aria-label="Maximize sketch">⊞</button>
        </div>
        <div id="ab-toggle-row">
          <span class="ab-toggle-label">Action bar</span>
          <button id="action-bar-toggle" :ariaPressed="ui.actionBarActive" aria-pressed="true" aria-label="Toggle action bar" title="Show the action bar above the input">{{ui.actionBarLabel}}</button>
        </div>
        <div id="export-zone">
          <div class="export-zone-label">Export / Import</div>
          <div id="export-tiles">
            <button class="export-tile" id="export-journal"    title="Download adventure as a styled HTML journal">Journal</button>
            <button class="export-tile" id="export-screenshot" title="Save current scene sketch as PNG">Screenshot</button>
            <button class="export-tile" id="export-sketches"   title="Download all session sketches as HTML">All Sketches</button>
            <button class="export-tile" id="export-import"     title="Import a saved game file">Import</button>
          </div>
          <input type="file" id="import-file-input" accept=".dnd.json,.json" style="display:none" aria-label="Import save file">
        </div>
      </aside>
    </main>

    <footer id="footer">
      <div id="action-bar" data-cloak data-if="ui.actionBarVisible" aria-label="Action bar">
        <div class="ab-zone ab-move-zone" role="group" aria-labelledby="ab-label-move">
          <div class="ab-zone-label" id="ab-label-move">Move</div>
          <div id="ab-compass">
            <button id="ab-north" class="ab-dir-btn" style="grid-column:2;grid-row:1" disabled aria-label="Go north">N</button>
            <button id="ab-west"  class="ab-dir-btn" style="grid-column:1;grid-row:2" disabled aria-label="Go west">W</button>
            <button id="ab-east"  class="ab-dir-btn" style="grid-column:3;grid-row:2" disabled aria-label="Go east">E</button>
            <button id="ab-south" class="ab-dir-btn" style="grid-column:2;grid-row:3" disabled aria-label="Go south">S</button>
          </div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-abilities-zone" role="group" aria-labelledby="ab-label-class">
          <div class="ab-zone-label" id="ab-label-class">Class</div>
          <div id="ab-abilities-list"></div>
        </div>
        <div class="ab-divider"></div>
        <div class="ab-zone ab-skills-zone" role="group" aria-labelledby="ab-label-skills">
          <div class="ab-zone-label" id="ab-label-skills">Skills</div>
          <div id="ab-skills-list"></div>
        </div>
      </div>
      <div id="debug-bar" role="button" tabindex="0" aria-label="Toggle last turn debug info" aria-expanded="false" aria-controls="debug-panel">
        <span>Last turn</span><span class="toggle-chevron">▾</span>
      </div>
      <div id="debug-panel"></div>
      <div id="input-row">
        <span id="prompt-indicator">&gt;</span>
        <input
          id="cmd"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="What do you do?"
          aria-label="Command input"
        >
        <button id="mic-btn" class="input-icon-btn" data-cloak :ariaPressed="ui.recording" aria-pressed="false" aria-label="Record voice input" title="Speak your action (Spacebar)" data-if="settings.stt"><svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor" aria-hidden="true" focusable="false"><circle cx="6.5" cy="6.5" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="6.5" cy="6.5" r="2.5"/></svg></button>
      </div>
    </footer>

    <div id="brand-bar">
      <span class="brand-social">
        <a href="https://github.com/D-dezeeuw" target="_blank" rel="noopener" aria-label="GitHub">
          <svg class="brand-icon" viewBox="0 0 16 16" aria-hidden="true"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
        <a href="https://www.npmjs.com/~ddezeeuw" target="_blank" rel="noopener" aria-label="npm">
          <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.332h-2.669v-.001zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"/></svg>
        </a>
      </span>
      <a class="brand-company" href="https://www.linkedin.com/in/ddezeeuw/" target="_blank" rel="noopener">Neko Media</a>
      <span class="brand-powered">Powered by <a href="https://www.npmjs.com/package/spektrum" target="_blank" rel="noopener"><em>SPEKTRUM</em></a></span>
    </div>

    <div id="roleplay-overlay" aria-hidden="true">
      <div class="sand-fall">
        <span class="sand-grain"></span>
        <span class="sand-grain"></span>
        <span class="sand-grain"></span>
        <span class="sand-grain"></span>
        <span class="sand-grain"></span>
      </div>
    </div>

  </div>
  <link rel="stylesheet" href="src/ui/style.css">
  <script src="vendor/app.bundle.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Dans-Dungeons/sw.js');
    }
  </script>
</body>
</html>
